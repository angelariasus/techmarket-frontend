version: 1
frontend:
  phases:
    preBuild:
      commands:
        - corepack enable
        - corepack prepare pnpm@9.15.0 --activate
        - pnpm install --no-frozen-lockfile --ignore-scripts
    build:
      commands:
        - pnpm exec ng build --configuration=production
  artifacts:
    baseDirectory: dist/techmarket-frontend/browser
    files:
      - '*/'
  cache:
    paths:
      - .pnpm-store/*/